trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '**/*'

pool:
  vmImage: 'ubuntu-latest'

stages:

# ---------------- INIT + PLAN ----------------
- stage: Plan
  displayName: Terraform Init & Plan
  jobs:
  - job: TerraformPlan
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - script: |
        terraform init
      displayName: Terraform Init

    - script: |
        terraform plan -out=tfplan
      displayName: Terraform Plan

    - publish: tfplan
      artifact: tfplan

# ---------------- APPLY (Manual Approval) ----------------
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - deployment: ApplyJob
    environment: 'prod-approval'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              terraform init
              terraform apply -auto-approve tfplan
            displayName: Terraform Apply

# ---------------- DESTROY (Manual Approval) ----------------
- stage: Destroy
  displayName: Terraform Destroy
  dependsOn: Apply

  jobs:
  - deployment: DestroyJob
    environment: 'destroy-approval'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              terraform init
              terraform destroy -auto-approve
            displayName: Terraform Destroy
